<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .hero { text-align: center; padding: 50px; background-color: #282c34; color: white; }
        .hero h1 { font-size: 48px; }
        .animate {
            animation: fadeIn 3s infinite;
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1 class="animate">The future of web development!</h1>
    </div>
</body>
</html>
